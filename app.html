<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 MGM Agent - HubSpot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      resize: vertical;
      min-height: 200px;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button.submit-btn {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button.submit-btn:hover {
      transform: translateY(-2px);
    }

    button.submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button.clear-btn {
      padding: 14px 20px;
      background: #e0e0e0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button.clear-btn:hover {
      background: #d0d0d0;
    }

    .loading {
      text-align: center;
      padding: 20px;
      display: none;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .results {
      margin-top: 30px;
      display: none;
    }

    .results.show {
      display: block;
    }

    .result-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 4px solid #667eea;
      font-size: 13px;
    }

    .result-item.success {
      background: #d4edda;
      border-left-color: #28a745;
      color: #155724;
    }

    .result-item.error {
      background: #f8d7da;
      border-left-color: #dc3545;
      color: #721c24;
    }

    .summary {
      margin-top: 15px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
    }

    .summary strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 MGM Agent</h1>
      <p>Processe múltiplas indicações em lote</p>
    </div>

    <form id="form">
      <div class="form-group">
        <label for="phones">📞 Telefones</label>
        <textarea 
          id="phones"
          placeholder="Cole um telefone por linha:&#10;11 98765-4321&#10;21 99999-8888&#10;85 98765-4321&#10;&#10;Ou com nome (opcional):&#10;11 98765-4321 - João Silva&#10;21 99999-8888 - Maria Santos"
          required
        ></textarea>
        <div class="hint">Um telefone por linha. Opcionalmente coloque " - Nome" após o telefone.</div>
      </div>

      <div class="button-group">
        <button type="submit" class="submit-btn">🚀 Processar</button>
        <button type="button" class="clear-btn" onclick="clearForm()">Limpar</button>
      </div>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Processando indicações...</p>
    </div>

    <div class="results" id="results">
      <h3>📊 Resultados</h3>
      <div id="resultsList"></div>
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const phonesTextarea = document.getElementById('phones');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const resultsList = document.getElementById('resultsList');
    const summary = document.getElementById('summary');

    function clearForm() {
      form.reset();
      results.classList.remove('show');
      resultsList.innerHTML = '';
      summary.innerHTML = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const text = phonesTextarea.value.trim();
      if (!text) {
        alert('Cole pelo menos um telefone!');
        return;
      }

      // Parsear linhas
      const lines = text.split('\n').filter(line => line.trim());
      const indicacoes = [];

      for (const line of lines) {
        const trimmed = line.trim();
        
        // Verificar se tem " - " para separar telefone e nome
        if (trimmed.includes(' - ')) {
          const [phone, name] = trimmed.split(' - ').map(x => x.trim());
          if (phone) indicacoes.push({ phone, name: name || null });
        } else {
          if (trimmed) indicacoes.push({ phone: trimmed, name: null });
        }
      }

      if (indicacoes.length === 0) {
        alert('Cole pelo menos um telefone válido!');
        return;
      }

      loading.classList.add('show');
      results.classList.remove('show');
      resultsList.innerHTML = '';

      try {
        let successCount = 0;
        let errorCount = 0;

        for (const ind of indicacoes) {
          try {
            const params = new URLSearchParams({
              phone: ind.phone,
              ...(ind.name && { name: ind.name })
            });

            const response = await fetch(`http://localhost:3000/api/mgm?${params}`);
            const data = await response.json();

            const resultItem = document.createElement('div');

            if (data.status === 'success') {
              successCount++;
              resultItem.className = 'result-item success';
              resultItem.innerHTML = `
                ✅ <strong>${ind.name || ind.phone}</strong> - ${data.action === 'created' ? 'Criado' : 'Atualizado'} (ID: ${data.contact_id})
              `;
            } else {
              errorCount++;
              resultItem.className = 'result-item error';
              resultItem.innerHTML = `
                ❌ <strong>${ind.phone}</strong> - ${data.message}
              `;
            }

            resultsList.appendChild(resultItem);

          } catch (error) {
            errorCount++;
            const resultItem = document.createElement('div');
            resultItem.className = 'result-item error';
            resultItem.innerHTML = `
              ❌ <strong>${ind.phone}</strong> - Erro: ${error.message}
            `;
            resultsList.appendChild(resultItem);
          }
        }

        summary.innerHTML = `
          <strong>Resumo:</strong> ${successCount} ✅ sucesso(s), ${errorCount} ❌ erro(s) de ${indicacoes.length} total(is)
        `;

        results.classList.add('show');

      } finally {
        loading.classList.remove('show');
      }
    });
  </script>
</body>
</html>
